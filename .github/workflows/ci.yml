name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check

      # Lint is enforced by Vercel's `next build` on every deploy.
      # Re-add `pnpm lint` here once we migrate from `next lint` (deprecated)
      # to standalone ESLint CLI:
      #   cd apps/web && npx @next/codemod@canary next-lint-to-eslint-cli .
